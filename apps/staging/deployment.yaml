apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-staging
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp-staging
  template:
    metadata:
      labels:
        app: myapp-staging
    spec:
      containers:
        - name: myapp
          image: 524178179037.dkr.ecr.us-east-1.amazonaws.com/myapp:705e55b102e46b3226a8a6b7cedea575bdc36b00
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"